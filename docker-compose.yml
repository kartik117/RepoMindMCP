services:
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/repomind-dev
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p repomind-dev 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
